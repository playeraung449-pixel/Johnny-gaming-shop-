<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ငွေလွှဲရန် - SO GAME SHOP</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #00AEEF 0%, #0072BC 100%);
            min-height: 100vh;
            display: flex; justify-content: center;
        }

        .main-container {
            width: 95%; max-width: 450px;
            background: white;
            margin: 20px 0; padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .label-text { font-size: 14px; color: #333; margin-bottom: 8px; font-weight: bold; }

        .select-box {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc;
            margin-bottom: 20px; font-size: 15px; display: flex; justify-content: space-between;
        }

        .pay-row {
            display: flex; align-items: center;
            border: 1px solid #ddd; border-radius: 12px;
            padding: 10px; margin-bottom: 12px;
            justify-content: space-between;
        }

        .pay-left { display: flex; align-items: center; gap: 10px; }
        .pay-logo { width: 80px; height: 45px; object-fit: contain; }
        
        .pay-details { font-size: 13px; }
        .pay-num { font-weight: bold; font-size: 15px; color: #000; }
        .pay-name { color: #666; font-size: 12px; }

        .copy-btn {
            background: #333; color: white; border: none;
            padding: 8px 16px; border-radius: 6px;
            font-size: 13px; cursor: pointer;
        }

        /* အထူးသတိပေးချက် Row */
        .notice-row {
            border: 1px solid #ff4d4d; border-radius: 12px;
            padding: 10px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .upload-box {
            border: 2px dashed #5C82FF
            ; border-radius: 12px;
            padding: 25px; text-align: center;
            margin-top: 15px; cursor: pointer; background: #f9fff9;
        }

        .submit-btn {
            width: 100%; background: #5C82FF; color: white;
            border: none; padding: 15px; border-radius: 10px;
            margin-top: 20px; font-size: 18px; font-weight: bold;
            cursor: pointer;
        }

        #loading { display: none; text-align: center; color: #0072BC; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-container">

    <div class="label-text">ငွေလွှဲနံပါတ်</div>

    <div class="pay-row">
        <div class="pay-left">
            <div style="background:#1850FF; color:white; width:70px; padding:5px; border-radius:5px; text-align:center; font-weight:bold;">KPay</div>
            <div class="pay-details">
                <div class="pay-num">09426012797</div>
                <div class="pay-name">Aung Zaw Myint</div>
            </div>
        </div>
        <button class="copy-btn" onclick="copyNum('0426012797', this)">Copy</button>
    </div>

    <div class="pay-row">
        <div class="pay-left">
            <div style="background:#fdd835; color:#333; width:70px; padding:5px; border-radius:5px; text-align:center; font-weight:bold;">WAVE</div>
            <div class="pay-details">
                <div class="pay-num">09792328651</div>
                <div class="pay-name">Htay htay hlaing</div>
            </div>
        </div>
        <button class="copy-btn" onclick="copyNum('09792328651', this)">Copy</button>
    </div>

    <div class="pay-row">
        <div class="pay-left">
            <div style="background:#1850FF; color:white; width:70px; padding:5px; border-radius:5px; text-align:center; font-weight:bold;">Kpay</div>
            <div class="pay-details">
                <div class="pay-num">09966760795</div>
                <div class="pay-name">Thet Aung</div>
            </div>
        </div>
        <button class="copy-btn" onclick="copyNum('09966760795', this)">Copy</button>
    </div>

    <div class="pay-row">
        <div class="pay-left">
            <div style="background:#fdd835; color:white; width:70px; padding:5px; border-radius:5px; text-align:center; font-weight:bold;">WAVE</div>
            <div class="pay-details">
                <div class="pay-num">09966760795</div>
                <div class="pay-name">SHWE OU</div>
            </div>
        </div>
        <button class="copy-btn" onclick="copyNum('09966760795', this)">Copy</button>
    </div>

    <div class="notice-row">
        <div class="pay-left">
            <div style="background: red; color: white; padding: 5px; border-radius: 5px; font-size: 10px; font-weight: bold; text-align: center;">အထူး<br>သတိပေးချက်</div>
            <div style="font-size: 12px; color: #333; margin-left: 5px;"><center>PH အပြောင်းလဲရှိပါသည်</center><br>မှားလွှဲပါက တာဝန်မယူပါ</div>
        </div>
        
    </div>

    <div class="label-text">Payment Screenshot ( ငွေလွှဲ Id ပါတဲ့ပုံ )</div>
    <div class="upload-box" onclick="document.getElementById('fIn').click()">
        <div style="font-size: 40px;">📷</div>
        <div id="f-lab" style="color: #28a745; font-weight: bold;">ငွေလွှဲscrennshortကိုထည့်ပါ</div>
        <input type="file" id="fIn" style="display:none;" accept="image/*" onchange="preview()">
    </div>

    <div id="loading">ခဏစောင့်ပါ... ပို့နေပါပြီ 🚀</div>
    <button class="submit-btn" onclick="sendToTelegram()">ဝယ်ယူမည်</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBND149pej01agdV6M0AH-n4Fyc8Yml6wQ",
        authDomain: "johnny-gaming-shop.firebaseapp.com",
        projectId: "johnny-gaming-shop",
        storageBucket: "johnny-gaming-shop.firebasestorage.app",
        messagingSenderId: "833081291484",
        appId: "1:833081291484:web:4dd45b8c5788e95fc4ba19"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Copy Function
    window.copyNum = function(num, btn) {
        navigator.clipboard.writeText(num).then(() => {
            btn.innerText = "Copied!";
            btn.style.background = "#28a745";
            setTimeout(() => { btn.innerText = "Copy"; btn.style.background = "#333"; }, 2000);
        });
    }

    // Preview Function
    window.preview = function() {
        const file = document.getElementById('fIn').files[0];
        if(file) document.getElementById('f-lab').innerText = "ပုံရွေးပြီးပါပြီ ✅";
    }

    // Telegram ပို့တဲ့ Function
    window.sendToTelegram = async function() {
        const fileInput = document.getElementById('fIn');
        const file = fileInput.files[0];
        const loading = document.getElementById('loading');
        const user = auth.currentUser;

        if (!file) { alert("ပုံတင်ပေးပါဦး သားကြီး"); return; }
        if (!user) { alert("အရင်ဆုံး Login ဝင်ပါ"); return; }

        loading.style.display = "block";

        const formData = new FormData();
        formData.append('chat_id', '6427719618');
        formData.append('photo', file);
        formData.append('caption', `💰 ငွေဖြည့်အော်ဒါအသစ်!\n\n👤 ယူဆာ: ${user.email}\n🆔 UID: ${user.uid}\n⏰ အချိန်: ${new Date().toLocaleString()}`);

        try {
            const res = await fetch('https://api.telegram.org/bot8653967411:AAFfw-0pR8RysuPD6aoSlZ7w7d8XNNs8l_A/sendPhoto', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                alert("အောင်မြင်ပါတယ်။ Admin က စစ်ဆေးပြီး ပိုက်ဆံဖြည့်ပေးပါလိမ့်မယ်။");
                window.location.href = "index.html";
            }
        } catch (e) {
            alert("လိုင်းမကောင်းပါ");
        } finally {
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
