<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Johnny Gaming Shop</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #001f3f; color: #fff; }
        .admin-header { background: #00152b; color: #0072BC; padding: 20px; text-align: center; font-weight: bold; font-size: 20px; border-bottom: 2px solid #0072BC; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        #pin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #00152b; z-index: 9999; display: flex;
            align-items: center; justify-content: center; flex-direction: column;
        }
        .pin-box { background: white; padding: 30px; border-radius: 15px; text-align: center; color: #333; width: 80%; max-width: 300px; }
        .pin-input { width: 100%; padding: 15px; font-size: 24px; text-align: center; letter-spacing: 5px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; outline: none; }

        #admin-content { display: none; }

        .admin-card { background: #002d5a; padding: 20px; border-radius: 15px; border: 1px solid #004080; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #00AEEF; }
        input, textarea { width: 100%; padding: 12px; background: #00152b; border: 1px solid #004080; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; outline: none; }
        
        .user-preview { background: #004080; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; border-left: 5px solid #00AEEF; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-search { background: #0072BC; color: white; }
        .btn-add { background: #28a745; color: white; }
        .btn-msg { background: #6f42c1; color: white; }
        .btn-nav { background: #444; color: white; text-decoration: none; text-align: center; flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; border:none; }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }

        /* အော်ဒါစာရင်းပိုင်း */
        .order-item { background: #00152b; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #004080; }
        .order-info { font-size: 13px; margin-bottom: 8px; }
        .btn-done { background: #ffc107; color: #000; padding: 8px; width: 100%; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        
        /* ✅ Reject Button Style */
        .btn-reject { 
            background: #dc3545; 
            color: white; 
            padding: 8px; 
            width: 100%; 
            border-radius: 5px; 
            border: none; 
            font-weight: bold;             cursor: pointer; 
            margin-top: 5px;
        }
        .btn-reject:hover { background: #c82333; }
        
        .status-success { color: #28a745; font-weight: bold; }
        .status-rejected { color: #dc3545; font-weight: bold; }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .btn { padding: 12px; font-size: 14px; }
            .pin-input { font-size: 20px; padding: 12px; }
        }
    </style>
</head>
<body>

<!-- 🔐 PIN Overlay -->
<div id="pin-overlay">
    <div class="pin-box">
        <h3 style="margin-top:0;">Boss Only</h3>
        <p>Admin PIN ရိုက်ထည့်ပါ</p>
        <input type="password" id="pin-input" class="pin-input" maxlength="4" placeholder="****" autofocus onkeydown="if(event.key==='Enter') verifyPin()">
        <button class="btn btn-search" onclick="verifyPin()">ဝင်မည်</button>
    </div>
</div>

<!-- 🎮 Admin Content -->
<div id="admin-content">
    <div class="admin-header">JOHNNY ADMIN CONTROL</div>
    <div class="container">
        <div class="admin-card">
            <label>User UID (User Profile ကနေကူးလာပါ)</label>
            <input type="text" id="target-uid" placeholder="UID ကို ဒီမှာ Paste လုပ်ပါ" onkeydown="if(event.key==='Enter') checkUser()">
            <button class="btn btn-search" onclick="checkUser()">Check User</button>

            <div id="user-info" class="user-preview">
                <div id="display-email">Email: </div>
                <div id="display-balance" style="font-weight: bold; color: #28a745; font-size: 18px; margin-top: 5px;">လက်ရှိ Balance: 0 Ks</div>
                
                <div style="margin-top: 20px;">
                    <label style="color: #fff; border-bottom: 1px solid #00AEEF; display:block; margin-bottom:10px;">ဝယ်ယူမှုမှတ်တမ်းများ</label>
                    <div id="purchase-list"></div>
                </div>
            </div>

            <div id="action-section" style="display: none; border-top: 1px solid #004080; padding-top: 15px;">
                <label>ပိုက်ဆံဖြည့်ရန် (Amount)</label>
                <input type="number" id="amount" placeholder="ဥပမာ - 5000">
                <button class="btn btn-add" id="add-btn" onclick="updateBalance()">Balance ထည့်မည်</button>
                <label style="margin-top: 15px;">User ဆီ စာပို့ရန်</label>
                <textarea id="admin-msg" placeholder="ဥပမာ - ပိုက်ဆံ ၅၀၀၀ ဖြည့်သွင်းမှု အောင်မြင်ပါသည်" rows="3"></textarea>
                <button class="btn btn-msg" onclick="sendMessage()">စာပို့မည်</button>
            </div>
        </div>

        <div class="nav-btns">
            <a href="index.html" class="btn-nav">Home Page</a>
            <button class="btn-nav" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<script>
    // 1️⃣ Supabase Configuration
    const supabaseUrl = 'https://jstevikyonzvbslsasth.supabase.co';
    const supabaseKey = 'sb_publishable_X4D-3gmE5QM51t9pHUOnGw_K-4CiVVG';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Admin Settings
    const ADMIN_EMAIL = "playeraung449@gmail.com";
    const ADMIN_PIN = "2009"; 

    // 2️⃣ Admin Auth Check on Load
    async function checkAdminAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session || session.user.email?.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
            window.location.href = "login.html";
            return;
        }
    }
    checkAdminAuth();

    // 🔐 PIN Verification (UI Layer - Same as before)
    window.verifyPin = function() {
        const input = document.getElementById('pin-input').value;
        if (input === ADMIN_PIN) {
            document.getElementById('pin-overlay').style.display = "none";
            document.getElementById('admin-content').style.display = "block";
        } else {
            alert("PIN မှားယွင်းနေပါသည်။");
            document.getElementById('pin-input').value = "";
        }
    }

    // 👤 User Lookup Function (Supabase Version)
    window.checkUser = async function() {
        const uid = document.getElementById('target-uid').value.trim();        if(!uid) return alert("UID အရင်ထည့်ပါ");
        
        try {
            // Get user data from 'users' table
            const { data: userData, error } = await supabase
                .from('users')
                .select('*')
                .eq('id', uid)
                .single();

            if (error || !userData) {
                alert("အကောင့်ရှာမတွေ့ပါ");
                document.getElementById('user-info').style.display = "none";
                document.getElementById('action-section').style.display = "none";
                return;
            }

            // Display user info
            document.getElementById('display-email').innerText = "Email: " + userData.email;
            document.getElementById('display-balance').innerText = "လက်ရှိ Balance: " + (userData.balance || 0) + " Ks";
            document.getElementById('user-info').style.display = "block";
            document.getElementById('action-section').style.display = "block";

            // Load purchase history
            loadUserPurchases(uid);

        } catch (e) { 
            alert("Error: " + e.message); 
        }
    }

    // 📦 Load User Purchases (Supabase Version)
    async function loadUserPurchases(uid) {
        const listDiv = document.getElementById('purchase-list');
        listDiv.innerHTML = "<p style='text-align:center;color:#888;'>Loading orders...</p>";
        
        try {
            // Get purchases from 'purchases' table where user_id matches
            const { data: orders, error } = await supabase
                .from('purchases')
                .select('*')
                .eq('user_id', uid)
                .order('time', { ascending: false });

            if (error) throw error;

            listDiv.innerHTML = "";

            if (!orders || orders.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center;color:#888;'>📭 ဝယ်ယူမှုမှတ်တမ်း မရှိသေးပါ</p>";                return;
            }

            orders.forEach((order) => {
                const orderId = order.id;
                const status = order.status || "pending";

                let statusText, statusClass;
                if(status === "pending") {
                    statusText = "⏳ ဆောင်ရွက်နေဆဲ";
                    statusClass = "";
                } else if(status === "success") {
                    statusText = "✅ အောင်မြင်သည်";
                    statusClass = "status-success";
                } else if(status === "rejected") {
                    statusText = "❌ လက်မခံပါ";
                    statusClass = "status-rejected";
                } else {
                    statusText = status;
                    statusClass = "";
                }

                const orderHtml = `
                    <div class="order-item">
                        <div class="order-info">
                            <b>${order.gameName || "Unknown"}</b> (${order.itemName || "Unknown"})<br>
                            ID: ${order.playerID || "-"}<br>
                            Price: ${order.price || 0} Ks<br>
                            Status: <span class="${statusClass}">${statusText}</span>
                        </div>
                        ${status === "pending" ? `
                            <button class="btn-done" onclick="completeOrder('${uid}', '${orderId}')">✅ Done လုပ်မည်</button>
                            <button class="btn-reject" onclick="rejectOrder('${uid}', '${orderId}')">❌ လက်မခံဘူး</button>
                        ` : ''}
                    </div>
                `;
                listDiv.innerHTML += orderHtml;
            });

        } catch (e) { 
            console.error(e); 
            listDiv.innerHTML = "<p style='text-align:center;color:#dc3545;'>Orders ဆွဲယူရာတွင် မှားယွင်းနေပါသည်။</p>"; 
        }
    }

    // ✅ Complete Order Function (Supabase Version)
    window.completeOrder = async function(uid, orderId) {
        if(confirm("ဒီအော်ဒါကို လုပ်ဆောင်ပြီးပြီလို့ သတ်မှတ်မလား Boss?")) {
            try {
                // 1. Update order status                await supabase
                    .from('purchases')
                    .update({ 
                        status: "success",
                        completedAt: new Date().toISOString()
                    })
                    .eq('id', orderId);
                
                // 2. Send success notification
                await supabase
                    .from('notifications')
                    .insert([{
                        user_id: uid,
                        text: "✅ ဝယ်ယူမှု အောင်မြင်ပါပြီ။ ပစ္စည်းကို ဂိမ်းထဲတွင် စစ်ဆေးနိုင်ပါပြီ။",
                        time: new Date().toISOString(),
                        read: false,
                        type: "admin_success"
                    }]);
                
                alert("အော်ဒါ အောင်မြင်ကြောင်း ပြောင်းလဲပြီးပါပြီ!");
                checkUser(); // Refresh list
            } catch (e) { alert("Error: " + e.message); }
        }
    }

    // ❌ Reject Order Function (Supabase Version)
    window.rejectOrder = async function(uid, orderId) {
        if(confirm("ဒီအော်ဒါကို လက်မခံဘူးလို့ သတ်မှတ်မလား Boss?")) {
            try {
                // 1. Update order status to rejected
                await supabase
                    .from('purchases')
                    .update({ 
                        status: "rejected",
                        rejectedAt: new Date().toISOString()
                    })
                    .eq('id', orderId);
                
                // 2. Send rejection notification
                await supabase
                    .from('notifications')
                    .insert([{
                        user_id: uid,
                        text: "❌ ဝယ်ယူမှုကို လက်မခံပါဘူး။ အကြောင်းအရင်းကို Admin ထံ ဆက်သွယ်မေးမြန်းနိုင်ပါတယ်။",
                        time: new Date().toISOString(),
                        read: false,
                        type: "admin_reject"
                    }]);
                
                alert("အော်ဒါကို လက်မခံကြောင်း ပြောင်းလဲပြီးပါပြီ!");                checkUser(); // Refresh list
            } catch (e) { 
                alert("Error: " + e.message); 
            }
        }
    }

    // 💰 Update Balance Function (Supabase Version)
    window.updateBalance = async function() {
        const uid = document.getElementById('target-uid').value.trim();
        const amt = parseInt(document.getElementById('amount').value);
        if(!amt || amt <= 0) return alert("ပမာဏ မှန်အောင်ထည့်ပါ");

        if(confirm(amt + " Ks ဖြည့်သွင်းမှာ သေချာလား?")) {
            try {
                // 1. Get current balance first (Supabase doesn't have atomic increment like Firebase)
                const { data: currentUser, error: fetchError } = await supabase
                    .from('users')
                    .select('balance')
                    .eq('id', uid)
                    .single();

                if (fetchError) throw fetchError;

                const newBalance = (currentUser.balance || 0) + amt;

                // 2. Update with new balance
                await supabase
                    .from('users')
                    .update({ balance: newBalance })
                    .eq('id', uid);
                
                // 3. Send notification
                await supabase
                    .from('notifications')
                    .insert([{
                        user_id: uid,
                        text: "💰 Balance " + amt + " Ks ဖြည့်သွင်းမှု အောင်မြင်ပါပြီ။",
                        time: new Date().toISOString(),
                        read: false,
                        type: "balance_topup"
                    }]);
                
                alert("ပိုက်ဆံဖြည့်ပြီးပါပြီ");
                checkUser(); // Refresh display
                document.getElementById('amount').value = "";
            } catch (e) { alert("Error: " + e.message); }
        }
    }
    // 💬 Send Message to User Function (Supabase Version)
    window.sendMessage = async function() {
        const uid = document.getElementById('target-uid').value.trim();
        const msg = document.getElementById('admin-msg').value;
        if(!msg) return alert("စာအရင်ရိုက်ပါ");

        try {
            await supabase
                .from('notifications')
                .insert([{
                    user_id: uid,
                    text: msg,
                    time: new Date().toISOString(),
                    read: false,
                    type: "admin_msg"
                }]);
            
            alert("စာပို့ပြီးပါပြီ");
            document.getElementById('admin-msg').value = "";
        } catch (e) { alert("Error: " + e.message); }
    }

    // 🚪 Logout Function (Supabase Version)
    window.logout = async function() {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    }
</script>

</body>
</html>
