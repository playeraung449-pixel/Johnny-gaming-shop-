<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔐 Login - Johnny Gaming Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS Library - MUST load before our script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Pyidaungsu', sans-serif;
            background: linear-gradient(180deg, #001f3f 0%, #00152b 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(255,255,255,0.08); border-radius: 20px; padding: 30px;
            width: 100%; max-width: 400px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo h1 { font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .logo p { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 5px; }
        
        .input-group { margin-bottom: 18px; }
        .input-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); }
        .input-field {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
            color: white; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #00AEEF; }
        .input-field::placeholder { color: rgba(255,255,255,0.5); }
        
        .password-wrapper { position: relative; }
        .toggle-pass {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer;
            padding: 5px; font-size: 14px;
        }
        .toggle-pass:hover { color: #fff; }
        
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #00AEEF, #0072BC);
            color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,174,239,0.4); }        .login-btn:active { transform: translateY(1px); }
        .login-btn:disabled { background: #555; cursor: not-allowed; transform: none; }
        
        .toggle-auth {
            text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.8);
        }
        .toggle-auth a { color: #00AEEF; text-decoration: none; font-weight: 600; cursor: pointer; }
        .toggle-auth a:hover { text-decoration: underline; }
        
        .forgot-pass { text-align: right; margin-top: -10px; margin-bottom: 15px; }
        .forgot-pass a { color: rgba(255,255,255,0.7); font-size: 12px; text-decoration: none; }
        .forgot-pass a:hover { color: #00AEEF; }
        
        .loading {
            text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.8);
        }
        .loading i { font-size: 32px; margin-bottom: 15px; animation: spin 1s linear infinite; display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .debug-panel {
            margin-top: 20px; padding: 10px; background: rgba(0,0,0,0.3);
            border-radius: 10px; font-size: 10px; color: #0f0; font-family: monospace;
            max-height: 100px; overflow-y: auto; display: none;
        }
        .debug-panel.show { display: block; }
        
        @media (max-width: 480px) {
            .login-container { padding: 25px 20px; }
            .logo h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1><i class="fas fa-gamepad"></i> Johnny Gaming</h1>
        <p>ဂိမ်းပစ္စည်းများ ဝယ်ယူရန် အကောင့်ဝင်ပါ</p>
    </div>

    <!-- 🔧 Debug Panel (Press D to toggle) -->
    <div class="debug-panel" id="debug-panel">
        <div id="debug-log">Debug ready...</div>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loading" style="display:none">
        <i class="fas fa-spinner"></i>
        <p>စစ်ဆေးနေသည်... 🔍</p>
        <small style="color:rgba(255,255,255,0.5);margin-top:10px;display:block">            (3 စက္ကန့် ကြာရင် အလိုအလျောက် ပြပါမည်)
        </small>
    </div>

    <!-- Login Form -->
    <form id="login-form" style="display:none" onsubmit="event.preventDefault(); doLogin();">
        <div class="input-group">
            <label class="input-label">📧 Email Address</label>
            <input type="email" id="email" class="input-field" placeholder="example@email.com" autocomplete="email">
        </div>
        
        <div class="input-group">
            <label class="input-label">🔐 Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" class="input-field" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="toggle-pass" onclick="togglePassword()">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <div class="forgot-pass">
            <a href="#" onclick="forgotPassword(); return false;">Password မှတ်မိမနေပါ?</a>
        </div>
        
        <button type="submit" class="login-btn" id="login-btn">
            <i class="fas fa-sign-in-alt"></i> ဝင်မည်
        </button>
    </form>

    <!-- Register Form (Hidden by default) -->
    <form id="register-form" style="display:none" onsubmit="event.preventDefault(); doRegister();">
        <div class="input-group">
            <label class="input-label">📧 Email Address</label>
            <input type="email" id="reg-email" class="input-field" placeholder="example@email.com" autocomplete="email">
        </div>
        
        <div class="input-group">
            <label class="input-label">🔐 Password (အနည်းဆုံး 6 စာလုံး)</label>
            <div class="password-wrapper">
                <input type="password" id="reg-password" class="input-field" placeholder="••••••••" minlength="6">
                <button type="button" class="toggle-pass" onclick="toggleRegPassword()">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <button type="submit" class="login-btn" id="register-btn" style="background:linear-gradient(135deg,#28A745,#20C997)">
            <i class="fas fa-user-plus"></i> အကောင့်ဖွင့်မည်
        </button>    </form>

    <!-- Toggle Auth Mode -->
    <div class="toggle-auth">
        <span id="auth-toggle-text">အကောင့်မရှိသေးပါလား?</span> 
        <a id="auth-toggle-link" onclick="toggleAuthMode()">အကောင့်ဖွင့်မည်</a>
    </div>
</div>

<script>
    // 🔧 DEBUG MODE - Press 'D' key to toggle debug panel
    let DEBUG = false;
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'd') {
            DEBUG = !DEBUG;
            document.getElementById('debug-panel').classList.toggle('show', DEBUG);
            log('🔧 Debug mode: ' + (DEBUG ? 'ON' : 'OFF'));
        }
    });
    
    function log(msg) {
        console.log('[JohnnyGaming]', msg);
        if (DEBUG) {
            const panel = document.getElementById('debug-log');
            panel.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + panel.innerHTML;
        }
    }

    // 1️⃣ Supabase Configuration
    const SUPABASE_URL = 'https://jstevikyonzvbslsasth.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_X4D-3gmE5QM51t9pHUOnGw_K-4CiVVG';
    
    log('🚀 Initializing Supabase...');
    log(`📍 URL: ${SUPABASE_URL}`);
    
    // ✅ Check if Supabase library loaded
    if (typeof window.supabase === 'undefined') {
        log('❌ ERROR: Supabase library NOT loaded!');
        alert('⚠️ System error: Supabase not loaded. Please refresh the page.');
    }
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    log('✅ Supabase client created');

    let currentUser = null;
    let isRegisterMode = false;

    // 🚀 NON-BLOCKING Init - Show form immediately!
    document.addEventListener('DOMContentLoaded', () => {
        log('📄 DOM loaded');        
        // ✅ Show login form immediately (don't wait for auth)
        document.getElementById('loading').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
        log('✅ Login form displayed');
        
        // 🔍 Check auth in background (won't block UI)
        checkAuthInBackground();
        
        // 🎯 Test button functionality
        testButtonFunctionality();
    });

    // 🔍 Background Auth Check (non-blocking)
    async function checkAuthInBackground() {
        try {
            log('🔐 Checking auth session...');
            const {  { session } } = await supabase.auth.getSession();
            
            if (session?.user) {
                log('✅ User already logged in: ' + session.user.email);
                currentUser = session.user;
                setTimeout(() => window.location.href = 'index.html', 300);
            } else {
                log('👤 No active session');
            }
        } catch (error) {
            log('⚠️ Auth check error (non-critical): ' + error.message);
            // Don't block - user can still login manually
        }
    }

    // 🎯 Test if buttons work
    function testButtonFunctionality() {
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        
        // Add click listeners as backup (in case onclick fails)
        if (loginBtn) {
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                log('🎯 Login button clicked (event listener)');
                doLogin();
            });
        }
        if (registerBtn) {
            registerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                log('🎯 Register button clicked (event listener)');
                doRegister();            });
        }
        log('✅ Button event listeners attached');
    }

    // 🔐 Login Function
    async function doLogin() {
        log('🔐 doLogin() called');
        
        const email = document.getElementById('email')?.value.trim();
        const password = document.getElementById('password')?.value;
        const btn = document.getElementById('login-btn');
        
        if (!email || !password) {
            alert('⚠️ Email နှင့် Password နှစ်ခုလုံး ဖြည့်ပါ');
            log('❌ Validation failed: empty fields');
            return;
        }
        
        log(`📧 Attempting login: ${email}`);
        
        // Loading state
        const originalBtn = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ဝင်နေသည်...';
        btn.disabled = true;
        
        try {
            const {  user, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                log('❌ Login error: ' + error.message);
                throw error;
            }
            
            if (user) {
                log('✅ Login successful: ' + user.email);
                currentUser = user;
                alert('✅ Login အောင်မြင်ပါပြီ! 🎉');
                window.location.href = 'index.html';
            }
        } catch (err) {
            log('❌ Login exception: ' + err.message);
            let msg = '❌ Login အဆင်မပြေ';
            if (err.message?.includes('Invalid login')) {
                msg = '❌ Email သို့မဟုတ် Password မှားနေပါသည်';
            } else if (err.message?.includes('Email not confirmed')) {
                msg = '📧 Email အတည်ပြုရန် လိုအပ်ပါသည်';            }
            alert(msg);
        } finally {
            btn.innerHTML = originalBtn;
            btn.disabled = false;
            log('🔁 Login button reset');
        }
    }

    // 📝 Register Function
    async function doRegister() {
        log('📝 doRegister() called');
        
        const email = document.getElementById('reg-email')?.value.trim();
        const password = document.getElementById('reg-password')?.value;
        const btn = document.getElementById('register-btn');
        
        if (!email || !password) {
            alert('⚠️ Email နှင့် Password နှစ်ခုလုံး ဖြည့်ပါ');
            return;
        }
        if (password.length < 6) {
            alert('⚠️ Password အနည်းဆုံး 6 စာလုံး ရှိရမည်');
            return;
        }
        
        log(`📧 Attempting register: ${email}`);
        
        const originalBtn = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ဖွင့်နေသည်...';
        btn.disabled = true;
        
        try {
            const {  user, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { username: email.split('@')[0] }
                }
            });
            
            if (error) throw error;
            
            if (user) {
                log('✅ Registration successful, creating user record...');
                
                // Create user record in public.users table
                const { error: dbError } = await supabase
                    .from('users')
                    .insert({                        id: user.id,
                        email: email,
                        username: email.split('@')[0],
                        balance: 0,
                        total_spent: 0,
                        spin_count: 0,
                        role: 'user'
                    });
                
                if (dbError) {
                    log('⚠️ User record creation warning: ' + dbError.message);
                    // Don't block - auth user created anyway
                }
                
                alert('✅ အကောင့်ဖွင့်ပြီးပါပြီ! 🎉\n\nEmail အတည်ပြုစာ ပို့ထားပါတယ်။\n(ဒါမှမဟုတ်) Admin (@Johnny_AZM) ကို ဆက်သွယ်ပြီး အတည်ပြုခိုင်းပါ။');
                toggleAuthMode(); // Switch back to login
            }
        } catch (err) {
            log('❌ Register exception: ' + err.message);
            let msg = '❌ အကောင့်ဖွင့်ရာတွင် အဆင်မပြေ';
            if (err.message?.includes('User already registered')) {
                msg = '⚠️ ဤ Email ဖြင့် အကောင့်ရှိပြီးပါပြီ';
            }
            alert(msg);
        } finally {
            btn.innerHTML = originalBtn;
            btn.disabled = false;
        }
    }

    // 🔁 Toggle Login/Register Forms
    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        log('🔄 Toggle auth mode: ' + (isRegisterMode ? 'register' : 'login'));
        
        document.getElementById('login-form').style.display = isRegisterMode ? 'none' : 'block';
        document.getElementById('register-form').style.display = isRegisterMode ? 'block' : 'none';
        
        document.getElementById('auth-toggle-text').textContent = isRegisterMode ? 'အကောင့်ရှိပြီးပါသလား?' : 'အကောင့်မရှိသေးပါလား?';
        document.getElementById('auth-toggle-link').textContent = isRegisterMode ? 'ဝင်မည်' : 'အကောင့်ဖွင့်မည်';
    }

    // 🔐 Toggle Password Visibility
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = input.nextElementSibling.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        log('👁️ Password visibility toggled');
    }    
    function toggleRegPassword() {
        const input = document.getElementById('reg-password');
        const icon = input.nextElementSibling.querySelector('i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    // 🔐 Forgot Password
    async function forgotPassword() {
        const email = prompt('📧 Email address ကို ရိုက်ထည့်ပါ:');
        if (!email) return;
        
        try {
            await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/login.html'
            });
            alert('✅ Password reset link ပို့လိုက်ပါပြီ!\n\nEmail ကို စစ်ဆေးပါ။');
        } catch (err) {
            alert('❌ အဆင်မပြေ: ' + err.message);
        }
    }

    // 🎨 Auth State Listener
    supabase.auth.onAuthStateChange((event, session) => {
        log(`🔄 Auth state changed: ${event}`);
        if (event === 'SIGNED_IN' && session?.user) {
            currentUser = session.user;
            window.location.href = 'index.html';
        }
        if (event === 'SIGNED_OUT') {
            currentUser = null;
        }
    });

    // ⌨️ Enter Key Support
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (isRegisterMode) {
                doRegister();
            } else {
                doLogin();
            }
        }
    });

    log('🎮 Johnny Gaming Shop login.js loaded');
</script>

</body></html>
