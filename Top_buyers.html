<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆 Top Buyers - Johnny Gaming Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Pyidaungsu', sans-serif;
            background: linear-gradient(180deg, #001f3f 0%, #00152b 100%);
            min-height: 100vh; color: #fff; padding-bottom: 20px;
        }

        /* 🎮 Header */
        .header {
            background: linear-gradient(135deg, #00152b, #002d5a);
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
            border-bottom: 2px solid #00AEEF; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .back-btn { text-decoration: none; color: #00AEEF; font-size: 24px; font-weight: bold; }
        .header-title { font-size: 17px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 8px; }

        /* 🏆 Podium Section - Top 3 */
        .podium-section {
            padding: 20px 15px 10px; display: flex; justify-content: center; align-items: flex-end; gap: 8px;
            min-height: 180px;
        }
        .podium-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            border-radius: 16px 16px 0 0; padding: 12px 8px 0;
            position: relative; animation: popIn 0.5s ease backwards;
        }
        @keyframes popIn { from { opacity: 0; transform: translateY(30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        .podium-item.first { 
            width: 38%; height: 140px; background: linear-gradient(145deg, #FFD700, #FFA500);
            z-index: 3; animation-delay: 0.1s; box-shadow: 0 8px 25px rgba(255,215,0,0.4);
        }
        .podium-item.second { 
            width: 28%; height: 100px; background: linear-gradient(145deg, #C0C0C0, #A9A9A9);
            z-index: 2; animation-delay: 0.2s; box-shadow: 0 6px 20px rgba(192,192,192,0.3);
        }
        .podium-item.third { 
            width: 28%; height: 75px; background: linear-gradient(145deg, #CD7F32, #8B4513);
            z-index: 1; animation-delay: 0.3s; box-shadow: 0 4px 15px rgba(205,127,50,0.3);
        }
        .podium-avatar {
            width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold;
            color: #333; box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        .podium-name { 
            font-size: 11px; font-weight: bold; color: #333; text-align: center;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .podium-amount { 
            font-size: 10px; color: rgba(51,51,51,0.9); font-weight: 600;
            background: rgba(255,255,255,0.8); padding: 2px 8px; border-radius: 10px;
        }
        .podium-rank {
            position: absolute; top: -12px; width: 26px; height: 26px; border-radius: 50%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .podium-item.first .podium-rank { background: #FFD700; }
        .podium-item.second .podmium-rank { background: #C0C0C0; }
        .podium-item.third .podium-rank { background: #CD7F32; color: #fff; }

        .crown { position: absolute; top: -28px; font-size: 22px; animation: bounce 1.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* 📋 Leaderboard List */
        .section-title {
            padding: 0 20px; margin: 15px 0 10px; font-size: 15px; font-weight: bold;
            display: flex; align-items: center; gap: 7px; color: #00AEEF;
        }
        .buyer-list {
            background: rgba(255,255,255,0.08); border-radius: 16px; margin: 0 15px;
            overflow: hidden; backdrop-filter: blur(10px);
        }
        .buyer-item {
            display: flex; align-items: center; padding: 13px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1); transition: background 0.2s;
        }
        .buyer-item:last-child { border-bottom: none; }
        .buyer-item:hover, .buyer-item:active { background: rgba(255,255,255,0.1); }

        .buyer-rank {
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 13px; margin-right: 12px; flex-shrink: 0;
        }
        .rank-gold { background: linear-gradient(145deg, #FFD700, #FFA500); color: #333; }
        .rank-silver { background: linear-gradient(145deg, #C0C0C0, #A9A9A9); color: #333; }
        .rank-bronze { background: linear-gradient(145deg, #CD7F32, #8B4513); color: #fff; }
        .rank-normal { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }
        .buyer-avatar {
            width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
            color: white; margin-right: 12px; flex-shrink: 0; box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .buyer-info { flex-grow: 1; min-width: 0; }
        .buyer-name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .buyer-name .verified { color: #00AEEF; font-size: 12px; }
        .buyer-email { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        
        .buyer-stats { text-align: right; flex-shrink: 0; }
        .buyer-amount { font-weight: bold; font-size: 13px; color: #00AEEF; }
        .buyer-percent { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 3px; }

        /* 📊 Progress Bar */
        .progress-bg {
            width: 60px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
            margin-top: 5px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #00AEEF, #0072BC); border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* ⏳ Skeleton Loading */
        .skeleton { animation: pulse 1.5s infinite; background: rgba(255,255,255,0.1) !important; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .skeleton-avatar { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; }
        .skeleton-text { height: 12px; border-radius: 4px; margin: 4px 0; background: rgba(255,255,255,0.1); }
        .skeleton-text.short { width: 40%; }
        .skeleton-text.long { width: 70%; }

        /* 📭 Empty State */
        .empty-state {
            text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.7);
        }
        .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.5; display: block; }
        .empty-state p { font-size: 14px; line-height: 1.5; }

        /* 🔄 Pull to Refresh Indicator */
        #refresh-indicator {
            text-align: center; padding: 10px; color: #00AEEF; font-size: 13px;
            display: none; animation: bounce 0.5s ease;
        }

        /* 📱 Responsive */
        @media (max-width: 400px) {
            .podium-item.first { width: 40%; height: 130px; }
            .podium-item.second, .podium-item.third { width: 26%; }            .podium-avatar { width: 40px; height: 40px; font-size: 16px; }
            .podium-name { font-size: 10px; }
            .buyer-name { font-size: 13px; }
            .buyer-amount { font-size: 12px; }
        }

        /* ✨ Confetti */
        .confetti {
            position: fixed; width: 8px; height: 8px; background: #FFD700;
            animation: fall 3s linear forwards; z-index: 999; pointer-events: none;
        }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

<!-- 🔄 Refresh Indicator -->
<div id="refresh-indicator">🔄 Refreshing...</div>

<!-- 🎮 Header -->
<div class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
    <div class="header-title"><i class="fas fa-trophy"></i> Top Buyers</div>
</div>

<!-- 🏆 Podium - Top 3 -->
<div class="podium-section" id="podium">
    <!-- JavaScript ကနေ ထည့်ပေးမယ် -->
</div>

<!-- 📋 Leaderboard List (Rank 4-10) -->
<div class="section-title"><i class="fas fa-list-ol"></i> Leaderboard</div>
<div class="buyer-list" id="buyer-list">
    <!-- Skeleton Loading -->
    <div class="buyer-item skeleton">
        <div class="skeleton-avatar"></div>
        <div style="flex:1">
            <div class="skeleton-text long"></div>
            <div class="skeleton-text short"></div>
        </div>
        <div class="skeleton-text short" style="width:50px"></div>
    </div>
    <div class="buyer-item skeleton">
        <div class="skeleton-avatar"></div>
        <div style="flex:1">
            <div class="skeleton-text long"></div>
            <div class="skeleton-text short"></div>
        </div>
        <div class="skeleton-text short" style="width:50px"></div>
    </div>    <div class="buyer-item skeleton">
        <div class="skeleton-avatar"></div>
        <div style="flex:1">
            <div class="skeleton-text long"></div>
            <div class="skeleton-text short"></div>
        </div>
        <div class="skeleton-text short" style="width:50px"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBND149pej01agdV6M0AH-n4Fyc8Yml6wQ",
        authDomain: "johnny-gaming-shop.firebaseapp.com",
        projectId: "johnny-gaming-shop",
        storageBucket: "johnny-gaming-shop.firebasestorage.app",
        messagingSenderId: "833081291484",
        appId: "1:833081291484:web:4dd45b8c5788e95fc4ba19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const podium = document.getElementById('podium');
    const buyerList = document.getElementById('buyer-list');
    let allBuyers = [];
    let maxSpent = 0;

    // 🔐 Privacy: Email Masking
    function maskEmail(email) {
        if (!email) return "Anonymous";
        const [name, domain] = email.split('@');
        if (!domain) return email;
        const masked = name.substring(0, 3) + "***";
        return `${masked}@${domain}`;
    }

    // 👤 Avatar Generator (Initials + Gradient)
    function getAvatar(name, index) {
        const initials = (name || "U").substring(0, 2).toUpperCase();
        const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
        return `<div class="buyer-avatar" style="background:linear-gradient(135deg,${colors[index%colors.length]},${colors[(index+2)%colors.length]})">${initials}</div>`;
    }

    // 💰 Format Currency
    function formatAmount(amount) {
        if (amount >= 100000) return (amount/100000).toFixed(1) + "သိန်း";        if (amount >= 10000) return (amount/1000).toFixed(1) + "K";
        return amount.toLocaleString() + " Ks";
    }

    // 🎉 Confetti Effect
    function createConfetti() {
        const colors = ['#FFD700', '#FF6B9D', '#4ECDC4', '#9B59B6', '#F39C12'];
        for (let i = 0; i < 40; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
            confetti.style.animationDelay = Math.random() * 0.5 + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4000);
        }
    }

    // 🏆 Render Podium (Top 3)
    function renderPodium(top3) {
        podium.innerHTML = '';
        if (top3.length < 1) return;

        // Order: 2nd, 1st, 3rd for visual layout
        const order = [1, 0, 2]; 
        order.forEach(pos => {
            if (!top3[pos]) return;
            const b = top3[pos];
            const rank = pos + 1;
            const crown = rank === 1 ? '<span class="crown">👑</span>' : '';
            
            podium.innerHTML += `
                <div class="podium-item ${rank===1?'first':rank===2?'second':'third'}">
                    ${crown}
                    <div class="podium-rank">${rank}</div>
                    <div class="podium-avatar">${(b.name||'U').substring(0,2).toUpperCase()}</div>
                    <div class="podium-name">${b.name} ${rank===1?'👑':''}</div>
                    <div class="podium-amount">${formatAmount(b.total)}</div>
                </div>
            `;
        });

        if (top3[0]) createConfetti(); // 🎉 Big win animation for #1
    }

    // 📋 Render List (Rank 4-10)
    function renderList(buyers) {
        if (buyers.length <= 3) {
            buyerList.innerHTML = `<div class="empty-state"><i>📭</i><p>Leaderboard အတွက် ဒေတာမရှိသေးပါ</p></div>`;            return;
        }

        const list = buyers.slice(3); // Skip top 3
        maxSpent = buyers[0]?.total || 1;

        buyerList.innerHTML = list.map((b, idx) => {
            const rank = idx + 4;
            const percent = Math.min(100, Math.round((b.total / maxSpent) * 100));
            const rankClass = rank<=3?'rank-gold':rank<=10?'rank-normal':'';
            
            return `
                <div class="buyer-item">
                    <div class="buyer-rank ${rankClass}">${rank}</div>
                    ${getAvatar(b.name, rank)}
                    <div class="buyer-info">
                        <span class="buyer-name">${b.name} ${rank===4?'<span class="verified">✓</span>':''}</span>
                        <span class="buyer-email">${maskEmail(b.email)}</span>
                    </div>
                    <div class="buyer-stats">
                        <div class="buyer-amount">${formatAmount(b.total)}</div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${percent}%"></div></div>
                        <div class="buyer-percent">${percent}%</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 🔄 Real-time Data Fetch
    const q = query(collection(db, "users"), orderBy("total_spent", "desc"), limit(10));
    
    onSnapshot(q, (snapshot) => {
        allBuyers = [];
        snapshot.forEach(doc => {
            const d = doc.data();
            if ((d.total_spent || 0) > 0) {
                allBuyers.push({
                    id: doc.id,
                    name: d.displayName || d.username || d.email?.split('@')[0] || "Anonymous",
                    email: d.email,
                    total: d.total_spent || 0
                });
            }
        });

        if (allBuyers.length === 0) {
            podium.innerHTML = '';
            buyerList.innerHTML = `<div class="empty-state"><i>🏆</i><p>Leaderboard စတင်ရန် ပထမဆုံး ဝယ်ယူသူ ဖြစ်လာပါစေ! 🚀</p></div>`;
            return;        }

        renderPodium(allBuyers.slice(0, 3));
        renderList(allBuyers);
    }, (error) => {
        console.error("Leaderboard error:", error);
        buyerList.innerHTML = `<div class="empty-state" style="color:#ff6b6b"><i>⚠️</i><p>ဒေတာဆွဲယူရာတွင် အဆင်မပြေ</p></div>`;
    });

    // 🔄 Pull to Refresh
    let startY = 0;
    const indicator = document.getElementById('refresh-indicator');
    document.addEventListener('touchstart', e => { startY = e.touches[0].pageY; }, { passive: true });
    document.addEventListener('touchend', e => {
        if (e.changedTouches[0].pageY - startY > 100 && window.scrollY === 0) {
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
                // Force refresh by re-querying (onSnapshot already handles real-time)
            }, 1000);
        }
    }, { passive: true });
</script>

</body>
</html>
